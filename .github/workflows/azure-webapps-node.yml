# Deploy Next.js to Azure App Service (Linux, Node.js 20)
#
# === SETUP REQUIRED (one-time) ===
# 1. Create Azure App Service:
#    - Runtime: Node.js 20 LTS, Linux
#    - Name: laundry-parts-hub  (must match AZURE_WEBAPP_NAME below)
#    - Startup command: node server.js
#
# 2. Add one GitHub Secret named AZURE_CREDENTIALS
#    Value = the full JSON output from:
#    az ad sp create-for-rbac --name "laundry-deploy" --role contributor \
#      --scopes /subscriptions/<SUB_ID>/resourceGroups/laundry-rg --json-auth
#    -> GitHub repo -> Settings -> Secrets -> Actions -> New secret -> AZURE_CREDENTIALS
#
# 3. Add environment variables in Azure Portal -> App Service -> Configuration -> Application settings:
#    ADMIN_PASSWORD        your-admin-password
#    ADMIN_EMAIL           your@email.com  (optional)
#    SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM  (optional)
#    NEXT_PUBLIC_SITE_URL  https://laundry-parts-hub.azurewebsites.net
#
# After these steps every push to main deploys automatically.

name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: laundry-parts-hub
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone output)
        run: npm run build

      - name: Prepare deployment package
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public       .next/standalone/public
          cp -r data         .next/standalone/data

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone/

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: Azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
          startup-command: 'node server.js'
